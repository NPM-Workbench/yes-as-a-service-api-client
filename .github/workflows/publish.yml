# workflow name
name: Publish Package

# trigger
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # system vm
    runs-on: ubuntu-latest

    steps:
      - name: Repo Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Check Node and NPM Version
        run: node -v && npm -v

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test -- --runInBand

      - name: Build Package
        run: npm run build

      - name: Publish to NPM
        run: npm publish
